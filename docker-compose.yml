# 開發環境：只起 PostgreSQL。
# backend/frontend/hardware-agent 開發時用 uv/pnpm 本機跑，不在此容器化。
# 完整服務 compose（backend/frontend 容器、備份排程等）於 Phase 7 部署再做。
# 帳密一律走 .env（見 .env.example）；DB port 只綁 127.0.0.1，不對外。
services:
  db:
    image: postgres:16.10
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # host 1234 → 容器內 postgres 5432（只綁 127.0.0.1，不對外）
      - "127.0.0.1:1234:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
