# 店內伺服器一鍵起停（概念骨架，docs/02 §5）。
# 注意：Dockerfile 與實際建置尚未在本機驗證（Phase 0 環境限制，見 PHASE0_STATUS.md）。
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: lucamp
      POSTGRES_PASSWORD: lucamp
      POSTGRES_DB: lucamp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql+asyncpg://lucamp:lucamp@db:5432/lucamp
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

  # hardware-agent 通常部署在 POS 實機（需接印表機/錢櫃），不在此 compose 內常駐。

volumes:
  pgdata:
